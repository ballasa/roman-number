name: Java CI
on:
  push:
    branches:
      - '**' # Verifica push su qualsiasi branch
  pull_request:
    branches:
      - '**' # Verifica pull request su qualsiasi branch

# Setup:
# - Selezione di un runner ubuntu-based;
# - Set up di Java 11.
jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      # Compilazione del progetto (fase di compile)
      - name: Compilazione
        run: mvn -B compile --file pom.xml

      # Esecuzione test (fase di test)
      - name: Esecuzione dei test
        run: mvn -B test --file pom.xml

      # Analisi statica (fase di package)
      # To do: rimuovere il commento quando checkstyle (issue #3) sarà completato
      # - name: Analisi statica
      #   run: mvn -B checkstyle:check --file pom.xml